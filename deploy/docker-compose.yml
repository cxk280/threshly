# Full Threshly stack: coordinator + scalable workers, on Postgres + MinIO (S3),
# with Prometheus + Grafana for observability.
#
#   docker compose -f deploy/docker-compose.yml up --build           # 2 workers by default
#   docker compose -f deploy/docker-compose.yml up --build --scale worker=5
#
# Then: coordinator http://localhost:8080 · Prometheus :9090 · Grafana :3000 (admin/admin)
# Submit from the host:  threshly submit examples/sample.jsonl --model demo-model

name: threshly

x-threshly-env: &threshly-env
  THRESHLY_DATABASE_URL: postgresql+psycopg://threshly:threshly@postgres:5432/threshly
  THRESHLY_S3_BUCKET: threshly
  THRESHLY_S3_ENDPOINT: http://minio:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1
  THRESHLY_LEASE_SECONDS: "30"
  THRESHLY_REAPER_INTERVAL: "2"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: threshly
      POSTGRES_PASSWORD: threshly
      POSTGRES_DB: threshly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threshly"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001" # web console
    volumes:
      - miniodata:/data

  coordinator:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      <<: *threshly-env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["threshly", "worker", "--coordinator", "http://coordinator:8080", "--engine", "mock", "--model", "demo-model"]
    environment:
      <<: *threshly-env
    depends_on:
      coordinator:
        condition: service_healthy
    deploy:
      replicas: 2

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - coordinator

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  miniodata:
